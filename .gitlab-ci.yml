workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

default:
  retry: 1
  artifacts:
    expire_in: 1 week

variables:
  GIT_DEPTH: 1
  # Pin Poetry to avoid silent drift; matches the pin used by .poetry-setup.
  POETRY_PIN: "2.1.2"
  RELEASE_TAG:
    value: ""
    description: "Tag to publish to TestPyPI/PyPI from a manually triggered default-branch web pipeline."

stages:
  - pre-commit
  - pyright
  - test
  - docs
  - dr-compliance
  - publish-test
  - publish

# ── Reusable anchors ──────────────────────────────────────────────────────────

.git_config: &git_config
 # Trust the GitLab checkout for build backends that call git to derive package metadata.
  - git config --global --add safe.directory "$CI_PROJECT_DIR"

.shared-setup:
  interruptible: true
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - when: never

.python-matrix:
  parallel:
    matrix:
      - VERSION: ["3.10", "3.11", "3.12"]
  image: python:$VERSION

.poetry-setup:
  before_script:
    - *git_config
    - export PATH=${HOME}/.local/bin:${PATH}
    - pip install --upgrade pip
    - pip install --user -U poetry==2.1.2
    - poetry config virtualenvs.in-project true
    - python --version
    - pip --version
    - poetry --version
    - poetry check

# ── Jobs ──────────────────────────────────────────────────────────────────────

test:
  extends: [.python-matrix, .shared-setup, .poetry-setup]
  stage: test
  needs: []
  script:
    - poetry install --with dev,test
    - poetry run pytest tests -vvv --cov=modelmaite --cov-report term-missing
  coverage: '/TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

test-onnx:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.11
  stage: test
  needs: []
  variables:
    MODELMAITE_REQUIRE_ONNX_RUNTIME: "1"
  script:
    - poetry install --with dev,test --extras onnx
    - poetry run pytest tests/test_onnx*.py -vvv

pyright-internal:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.11
  stage: pyright
  needs: []
  script:
    - poetry install --with dev
    - poetry run pyright src/

# Deploy docs preview on merge requests
pages-branch:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.11
  stage: docs
  needs: []
  artifacts:
    expose_as: 'Documentation Build'
    paths:
      - public/
  environment:
    name: docs-preview/$CI_MERGE_REQUEST_IID
    url: "https://jatic.pages.jatic.net/-/orchestration-interoperability/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
    auto_stop_in: 1 week
  script:
    - poetry install --with docs --no-cache
    - poetry run mkdocs build -d public --no-directory-urls
  variables:
    PUBLIC_URL: "/-/orchestration-interoperability/$CI_PROJECT_NAME/-/jobs/$CI_JOB_ID/artifacts/public/"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: never

# Deploy production docs on merge to default branch
pages:
  extends: [.shared-setup, .poetry-setup]
  image: python:3.11
  stage: docs
  needs: []
  script:
    - poetry install --with docs --no-cache
    - poetry run mkdocs build -d public --no-directory-urls
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Publish ───────────────────────────────────────────────────────────────────

# Build and publish the distribution for an existing release tag. PyPI and
# TestPyPI use API tokens because PyPI/TestPyPI have not yet onboarded
# gitlab.jatic.net as a trusted self-managed GitLab issuer.
# Run from CI/CD -> Pipelines -> Run pipeline on the default branch with
# RELEASE_TAG set, publishing to TestPyPI first and then PyPI.
.publish-python-package:
  stage: publish
  image: python:3.13-slim
  retry: 0
  interruptible: false
  resource_group: pypi-publish
  timeout: 20m
  # Publish jobs build release artifacts from the checked-out tag and should not
  # download artifacts from earlier stages; those reports make the worktree dirty.
  dependencies: []
  variables:
    # Full clone history so the tag can be verified against the default branch.
    GIT_DEPTH: "0"
  artifacts:
    when: always
    paths:
      - dist/
    expire_in: never
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - pip install --quiet --upgrade pip
    - pip install --quiet "poetry==${POETRY_PIN}" "twine==6.2.0" "check-wheel-contents==0.6.3"
    - python --version
    - poetry --version
    - twine --version
    - check-wheel-contents --version
  script:
    - |
      set -euo pipefail

      if [ -z "${RELEASE_TAG:-}" ]; then
        echo "RELEASE_TAG must be set in the 'Run pipeline' form (CI/CD -> Pipelines -> Run pipeline)."
        exit 1
      fi

      RELEASE_TAG="$(printf '%s' "$RELEASE_TAG" | tr -d '[:space:]')"
      if ! [[ "$RELEASE_TAG" =~ ^[0-9]+[.][0-9]+[.][0-9]+([.-][A-Za-z0-9.]+)?$ ]]; then
        echo "RELEASE_TAG '$RELEASE_TAG' must match X.Y.Z with no 'v' prefix."
        exit 1
      fi

      if [ "${PYPI_ENVIRONMENT_NAME}" = "TestPyPI" ]; then
        if [ -z "${TEST_PYPI_API_TOKEN:-}" ]; then
          echo "TEST_PYPI_API_TOKEN is not available; add a masked/protected TestPyPI API token in GitLab CI/CD variables."
          exit 1
        fi
        export TWINE_USERNAME="__token__"
        export TWINE_PASSWORD="$TEST_PYPI_API_TOKEN"
      else
        if [ -z "${PYPI_API_TOKEN:-}" ]; then
          echo "PYPI_API_TOKEN is not available; add a masked/protected PyPI API token in GitLab CI/CD variables."
          exit 1
        fi
        export TWINE_USERNAME="__token__"
        export TWINE_PASSWORD="$PYPI_API_TOKEN"
      fi

      echo "Publish to ${PYPI_ENVIRONMENT_NAME} triggered by ${GITLAB_USER_LOGIN:-unknown} (${GITLAB_USER_EMAIL:-unknown}) at $(date -u +%FT%TZ)."

      git fetch --no-tags origin "+refs/heads/${CI_DEFAULT_BRANCH}:refs/remotes/origin/${CI_DEFAULT_BRANCH}"

      REMOTE_TAG_OBJECT="$(git ls-remote --tags --refs origin "refs/tags/${RELEASE_TAG}" | awk 'NF {print $1; exit}')"
      if [ -z "$REMOTE_TAG_OBJECT" ]; then
        echo "RELEASE_TAG '$RELEASE_TAG' not found on origin."
        exit 1
      fi

      if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
        LOCAL_TAG_OBJECT="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}")"
        if [ "$LOCAL_TAG_OBJECT" != "$REMOTE_TAG_OBJECT" ]; then
          echo "Tag '$RELEASE_TAG' on origin ($REMOTE_TAG_OBJECT) does not match local ($LOCAL_TAG_OBJECT); refusing to publish."
          exit 1
        fi
      else
        git fetch --no-tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
      fi

      TAG_COMMIT="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
      echo "Publishing ${RELEASE_TAG} (${TAG_COMMIT}) to ${PYPI_ENVIRONMENT_NAME}."

      if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/${CI_DEFAULT_BRANCH}"; then
        echo "RELEASE_TAG ${RELEASE_TAG} (${TAG_COMMIT}) is not on origin/${CI_DEFAULT_BRANCH}."
        exit 1
      fi

      rm -rf dist/
      git checkout --detach "$TAG_COMMIT"
      poetry build
      twine check dist/*
      check-wheel-contents dist/*.whl
      python - "$RELEASE_TAG" <<'PY'
      import sys
      from pathlib import Path
      from packaging.utils import parse_sdist_filename, parse_wheel_filename
      from packaging.version import Version

      expected = Version(sys.argv[1])
      matched = 0
      for artifact in Path("dist").iterdir():
          if artifact.suffix == ".whl":
              _, version, _, _ = parse_wheel_filename(artifact.name)
          elif artifact.name.endswith(".tar.gz"):
              _, version = parse_sdist_filename(artifact.name)
          else:
              continue
          matched += 1
          if version != expected:
              raise SystemExit(
                  f"Built artifact {artifact.name} has version {version}, expected tag version {expected}."
              )

      if matched == 0:
          raise SystemExit("No wheel or sdist artifacts were built in dist/.")
      print(f"Verified {matched} artifact(s) for version {expected}.")
      PY
      status="$(git status --porcelain)"
      if [ -n "$status" ]; then
        echo "Build left tracked/unignored worktree changes:"
        printf '%s\n' "$status"
        exit 1
      fi
      twine upload --non-interactive --disable-progress-bar --skip-existing dist/*

publish-testpypi:
  extends: .publish-python-package
  stage: publish-test
  environment:
    name: pypi-test
    url: https://test.pypi.org/project/modelmaite/
  variables:
    PYPI_ENVIRONMENT_NAME: "TestPyPI"
    TWINE_REPOSITORY_URL: "https://test.pypi.org/legacy/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never

publish-pypi:
  extends: .publish-python-package
  environment:
    name: pypi-production
    url: https://pypi.org/project/modelmaite/
  variables:
    PYPI_ENVIRONMENT_NAME: "PyPI"
    TWINE_REPOSITORY_URL: "https://upload.pypi.org/legacy/"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: false
    - when: never

# ── DevSecOps components ──────────────────────────────────────────────────────

include:
  - component: gitlab.jatic.net/jatic/devsecops/components/pre-commit@1.1.0
    inputs:
      stage: pre-commit
      project_path: "jatic/orchestration-interoperability/modelmaite"
      allow_failure: false

  - component: gitlab.jatic.net/jatic/devsecops/components/dr-compliance@0.5.2
    inputs:
      stage: dr-compliance
      sast_excluded_paths: tests
      sast_search_max_depth: "4"
      image: harbor.jatic.net:443/platform-team/base-images/python-base-image:3.11
      full_execution_on_commit: true
      allow_failure: true
